services:
  openwa-api:
    build: ./openwa
    container_name: openwa-api
    restart: unless-stopped
    env_file: ./openwa/.env
    ports:
      - "2785:2785"
    volumes:
      - openwa-data:/app/data
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  openwa-dashboard:
    build:
      context: ./openwa/dashboard
      dockerfile: Dockerfile.traefik
    container_name: openwa-dashboard
    restart: unless-stopped
    ports:
      - "2886:80"
    depends_on:
      - openwa-api
    networks:
      - chatbot_network

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./Modelfile:/tmp/Modelfile
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: chatbot_backend
    restart: always
    depends_on:
      openwa-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  monitor:
    build: ./monitor
    container_name: chatbot_monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:3000
      - OPENWA_URL=http://openwa-api:2785
      - CHECK_INTERVAL=300
    volumes:
      - monitor-data:/data
    networks:
      - chatbot_network
    depends_on:
      - openwa-api

volumes:
  ollama_data:
  openwa-data:
  monitor-data:

networks:
  chatbot_network:
    external: true

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./Modelfile:/tmp/Modelfile
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: chatbot_backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - baileys-auth:/app/auth
    networks:
      - chatbot_network
      - accion-comunitaria_default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  monitor:
    build: ./monitor
    container_name: chatbot_monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:3000
      - CHECK_INTERVAL=300
    volumes:
      - monitor-data:/data
    networks:
      - chatbot_network
    depends_on:
      - backend

volumes:
  ollama_data:
  baileys-auth:
  monitor-data:

networks:
  chatbot_network:
    external: true
  accion-comunitaria_default:
    external: true
